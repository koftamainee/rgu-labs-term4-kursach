page:
  margins:
    left: 20mm
    right: 15mm
    top: 15mm
    bottom: 15mm
  numbering:
    start_from: 1
    show_on_title: false

fonts:
  main:
    family: "Linux Libertine"
    size: 14pt
    line_spacing: 1.15
    align: justify
    indent: true
  heading:
    family: "Linux Libertine"
    size: 16pt
    line_spacing: 1.5
    align: left
    bold: true
  caption:
    family: "Linux Libertine"
    size: 12pt
    line_spacing: 1.0
    italic: true
  listing_body:
    family: "Inconsolata"
    size: 12pt
    line_spacing: 1.0
    align: left

figures:
  align: center
  caption_position: below
  caption_format: "Рисунок {n}. {text}"

tables:
  align: center
  caption_position: above
  caption_format: "Таблица {n}. {text}"

listings:
  caption_position: above
  caption_format: "Листинг {n}. {text}"

bibliography:
  standard: GOST-7.0.100-2018
  label_format: "[{n}]"
